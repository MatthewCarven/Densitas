# Densitas - tunable parameters.

[world]
width = 256
height = 192
seed = 42
sea_level = 0.30
beach_thresh = 0.34
forest_thresh = 0.55
hill_thresh = 0.70
mountain_thresh = 0.85

[render]
art_style = "pixel"
tile_size = 16
viewport_w = 1280
viewport_h = 720
fps_target = 60

[camera]
scroll_speed = 12.0
edge_scroll_px = 24

[citizen]
initial_population  = 8
spawn_radius_tiles  = 5
spawn_seed          = 0
maturity_age        = 8.0
lifespan_mean       = 180.0
lifespan_jitter     = 40.0
repro_radius        = 2
repro_cooldown      = 5.0
mate_duration       = 0.5
dying_duration      = 2.0
wander_period       = 2.0
wander_radius       = 6
wander_speed        = 1.0
tick_hz             = 5

[belief]
grid_w            = 64
grid_h            = 48
amplitude         = 1.0
blur_passes       = 2
blur_radius       = 1
recompute_hz      = 5
overlay_alpha_max = 180

[food]
# P1.5 - tuned 2026-05-21 for ~2000 citizen equilibrium on the default map.
# Carrying-capacity math: N_eq = total_regen_per_sec / hunger_rate.
hunger_rate             = 0.05    # 1/sim_sec -> full->starving in 20 sim sec
forage_threshold        = 0.40    # hunger above this -> FORAGE
repro_hunger_threshold  = 0.30    # both partners must be below this to mate
starve_hunger           = 1.00    # hunger >= this -> DYING (starvation)
eat_amount              = 0.20    # (unused; bite_size + calorie_per_food drive it)
eat_duration            = 1.00    # sim sec spent in EATING per visit
bite_size               = 0.20    # tile food consumed per EATING tick
calorie_per_food        = 1.00    # 1 unit food reduces hunger by this much
forage_radius_tiles     = 8
min_forage_food         = 0.10    # ignore tiles below this (lowered with caps)
overlay_alpha_max       = 160

[food.biome]
# Caps and regens scaled so total ~100 food/sec regen, refill in ~150 sim sec.
forest_initial    = 1.00
forest_regen      = 0.007
grass_initial     = 0.80
grass_regen       = 0.005
beach_initial     = 0.50
beach_regen       = 0.003
hill_initial      = 0.30
hill_regen        = 0.002
holy_initial      = 0.15
holy_regen        = 0.001
